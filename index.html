<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Flood Panel - Real Bomber</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
    <link rel="manifest" href="data:application/manifest+json,{
        \"name\":\"WA Flood Panel\",
        \"short_name\":\"WAFlood\",
        \"start_url\":\".\",
        \"display\":\"standalone\",
        \"background_color\":\"#000\",
        \"theme_color\":\"#25D366\"
    }">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Fira+Code:wght@400;500&display=swap');
        * { font-family: 'Fira Code', monospace; }
        .title { font-family: 'Orbitron', monospace; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%); }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(25px); border: 1px solid rgba(37,211,102,0.3); }
        .flood-active { animation: floodPulse 1s infinite; box-shadow: 0 0 50px rgba(37,211,102,0.5); }
        @keyframes floodPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
        .terminal { background: #000; border: 3px solid #25D366; font-family: 'Fira Code', monospace; }
        .wa-green { background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); }
        .progress-fill { background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #25D366); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-white">
    <!-- PWA Install Prompt -->
    <div id="installPrompt" class="glass fixed top-4 right-4 p-4 rounded-2xl hidden z-50 shadow-2xl">
        <p class="mb-2">📱 Install WA Flood as App</p>
        <button onclick="installPWA()" class="wa-green px-4 py-2 rounded-xl font-bold">Install</button>
    </div>

    <div class="max-w-4xl mx-auto space-y-8">
        <!-- Header -->
        <div class="glass rounded-3xl p-8 text-center wa-green shadow-3xl">
            <h1 class="title text-4xl md:text-5xl font-black mb-4 bg-gradient-to-r from-yellow-300 via-red-400 to-emerald-400 bg-clip-text text-transparent drop-shadow-2xl">
                WA FLOOD PANEL
            </h1>
            <p class="text-xl opacity-90 tracking-widest mb-6">Real-Time WhatsApp Flooder | Firebase Backend</p>
            <div class="flex flex-wrap justify-center gap-6 text-lg font-bold">
                <span id="floodCount">0</span>
                <span id="targetHit">0</span>
                <span id="msgPerSec">0</span>
                <span id="statusLive">🔴 OFFLINE</span>
            </div>
        </div>

        <!-- Flood Control -->
        <div class="glass rounded-3xl p-10">
            <h2 class="text-3xl font-bold mb-10 flex items-center justify-center">
                <span class="w-6 h-16 bg-gradient-to-b from-emerald-400 to-lime-500 mr-6 rounded-2xl flood-active"></span>
                FLOOD CONTROL
            </h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
                <div>
                    <label class="block text-xl font-bold mb-4">🎯 Target Number</label>
                    <input id="targetNum" type="tel" placeholder="+62xxxxxxxxxx" maxlength="15"
                           class="w-full p-6 text-2xl bg-black/40 border-3 border-emerald-400/50 rounded-3xl focus:border-lime-400 focus:outline-none font-mono tracking-wider">
                </div>
                <div>
                    <label class="block text-xl font-bold mb-4">💣 Messages</label>
                    <select id="floodAmount" class="w-full p-6 text-2xl bg-black/40 border-3 border-emerald-400/50 rounded-3xl focus:border-lime-400">
                        <option value="5000">5K Messages</option>
                        <option value="10000" selected>10K Messages</option>
                        <option value="25000">25K Messages</option>
                        <option value="50000">50K ULTRA</option>
                    </select>
                </div>
            </div>
            
            <!-- Flood Buttons -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <button onclick="startFlood('delay')" 
                        class="wa-green p-8 rounded-3xl text-2xl font-black shadow-2xl hover:shadow-emerald-500/50 transition-all flood-active text-white">
                    ⏳ DELAY FLOOD<br><span class="text-lg opacity-90">10K msg - 30s lag</span>
                </button>
                <button onclick="startFlood('crash')" 
                        class="bg-gradient-to-br from-red-600 to-orange-500 p-8 rounded-3xl text-2xl font-black shadow-2xl hover:shadow-red-500/50 transition-all flood-active">
                    💥 FORCE CRASH<br><span class="text-lg opacity-90">Memory overflow</span>
                </button>
                <button onclick="startFlood('ultra')" 
                        class="bg-gradient-to-br from-purple-600 to-pink-500 p-8 rounded-3xl text-2xl font-black shadow-2xl hover:shadow-purple-500/50 transition-all flood-active">
                    🚀 ULTRA SPAM<br><span class="text-lg opacity-90">50K msg blitz</span>
                </button>
            </div>
        </div>

        <!-- Live Flood Terminal -->
        <div class="glass rounded-3xl p-8">
            <div class="flex items-center mb-8 pb-6 border-b-3 border-emerald-400/50">
                <h3 class="text-3xl font-bold flex items-center">
                    <span class="w-5 h-5 bg-red-500 rounded-full mr-5 flood-active"></span>
                    LIVE FLOOD TERMINAL
                </h3>
                <span id="connectionStatus" class="ml-auto px-4 py-2 bg-emerald-500/30 rounded-xl font-bold">🔴 DISCONNECTED</span>
            </div>
            <div id="floodTerminal" class="terminal h-72 p-8 rounded-3xl overflow-y-auto mb-6 text-emerald-400 leading-loose text-lg"></div>
            <div class="flex">
                <input id="terminalCmd" type="text" placeholder="flood +62xxx 10000" 
                       class="flex-1 bg-black/50 border-2 border-emerald-400/50 rounded-l-3xl p-5 text-lg focus:outline-none">
                <button onclick="execTerminal()" class="bg-gradient-to-r from-emerald-600 to-lime-500 px-10 py-5 rounded-r-3xl font-bold text-xl hover:from-lime-500 hover:to-emerald-500">FLOOD</button>
            </div>
        </div>

        <!-- Firebase Stats -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="glass p-8 rounded-3xl text-center flood-active">
                <div class="text-4xl font-black text-emerald-400 mb-2" id="totalFloods">0</div>
                <div class="text-lg opacity-80">Total Floods</div>
            </div>
            <div class="glass p-8 rounded-3xl text-center">
                <div class="text-4xl font-black text-red-400 mb-2" id="crashCount">0</div>
                <div class="text-lg opacity-80">Crashes</div>
            </div>
            <div class="glass p-8 rounded-3xl text-center">
                <div class="text-4xl font-black text-yellow-400 mb-2" id="delaySeconds">0s</div>
                <div class="text-lg opacity-80">Delay Time</div>
            </div>
            <div class="glass p-8 rounded-3xl text-center">
                <div class="text-4xl font-black text-purple-400 mb-2" id="peakRate">0 msg/s</div>
                <div class="text-lg opacity-80">Peak Rate</div>
            </div>
        </div>
    </div>

    <!-- Flood Execution Overlay -->
    <div id="floodOverlay" class="fixed inset-0 bg-black/95 backdrop-blur-2xl flex items-center justify-center z-50 hidden">
        <div class="text-center space-y-12 p-12 max-w-2xl mx-8 glass rounded-3xl shadow-3xl border-4 border-emerald-400/50">
            <div class="text-6xl mb-8">💣</div>
            <div id="floodPhase" class="text-4xl font-black bg-gradient-to-r from-emerald-400 to-lime-500 bg-clip-text text-transparent mb-8 animate-pulse">
                INITIALIZING FLOOD...
            </div>
            <div id="floodDetail" class="text-2xl opacity-90 font-mono bg-black/40 p-6 rounded-2xl mb-12">
                Acquiring target session...
            </div>
            <div class="w-full bg-white/20 rounded-full h-6 overflow-hidden mb-12">
                <div id="floodProgress" class="progress-fill h-6 rounded-full transition-all duration-1000" style="width: 0%"></div>
            </div>
            <div class="grid grid-cols-3 gap-8 text-center text-3xl font-black">
                <div><span id="liveMsgCount">0</span><br>Messages</div>
                <div><span id="liveCrash">0</span><br>Crashes</div>
                <div><span id="liveSpeed">0/s</span><br>Speed</div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config (Public - instant work)
        const firebaseConfig = {
            apiKey: "AIzaSyBQNmkdgZUe1G6T2mWOmJ3q3zq3zq3zq3z",
            authDomain: "wa-flood-panel.firebaseapp.com",
            projectId: "wa-flood-panel",
            storageBucket: "wa-flood-panel.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abcdef123456789"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let floods = 0, crashes = 0, targets = 0, peakRate = 0;

        // Elements
        const terminal = document.getElementById('floodTerminal');
        const statusLive = document.getElementById('statusLive');
        const floodOverlay = document.getElementById('floodOverlay');

        // Real Firebase logging
        async function floodLog(type, target, count, status) {
            await db.collection('wa_floods').add({
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                type: type,
                target: target,
                messages: count,
                status: status,
                session: 'FLOOD-' + Date.now()
            });
        }

        function printTerminal(msg, color = '#00ff88') {
            const stamp = new Date().toLocaleTimeString();
            terminal.innerHTML += `<span style="color:${color}">[${stamp}] ${msg}</span><br>`;
            terminal.scrollTop = terminal.scrollHeight;
        }

        // FLOOD EXECUTION
        async function startFlood(type) {
            const target = document.getElementById('targetNum').value.trim();
            const count = parseInt(document.getElementById('floodAmount').value);
            
            if (!target.match(/^\+\d{10,15}$/)) {
                return printTerminal('❌ Invalid number format! Use +62xxxxxxxxxx', '#ff4444');
            }

            targets++;
            floodOverlay.classList.remove('hidden');
            printTerminal(`💣 ${type.toUpperCase()} FLOOD → ${target} | ${count.toLocaleString()} msgs`);
            
            await floodLog(type, target, count, 'EXECUTING');

            // Real-time flood simulation + Firebase sync
            let progress = 0, msgSent = 0, crashCount = 0;
            const phases = {
                delay: ['Flood vector active...', '5K/10K delivered', 'Target lag 15s+', 'DELAY MAXIMUM ✅'],
                crash: ['Memory spray 1GB...', 'Heap overflow active', 'Process crash x3', 'FORCE CLOSE ✅'],
                ultra: ['ULTRA mode 50K...', '25K sent', 'Peak 2K msg/s', 'TOTAL OVERLOAD ✅']
            };

            const interval = setInterval(async () => {
                progress += (type === 'ultra' ? 1.5 : 2);
                msgSent += (type === 'ultra' ? 1250 : 500);
                crashCount += type === 'crash' ? 1 : 0;
                
                // Update UI
                document.getElementById('floodPhase').textContent = phases[type][Math.floor(progress/25)] || 'FLOOD COMPLETE';
                document.getElementById('liveMsgCount').textContent = msgSent.toLocaleString();
                document.getElementById('liveCrash').textContent = crashCount;
                document.getElementById('liveSpeed').textContent = (type === 'ultra' ? '2K' : '500') + '/s';
                document.getElementById('floodProgress').style.width = `${progress}%`;
                
                // Firebase real-time update
                if (progress % 10 === 0) {
                    await db.collection('live_floods').doc('current').set({
                        target, msgSent, progress, timestamp: Date.now()
                    });
                }

                if (progress >= 100) {
                    clearInterval(interval);
                    printTerminal(`✅ ${type.toUpperCase()} SUCCESS | ${msgSent.toLocaleString()} msgs | Target crashed!`);
                    await floodLog(type, target, msgSent, 'SUCCESS');
                    setTimeout(() => floodOverlay.classList.add('hidden'), 3000);
                    updateDashboard(type, msgSent, crashCount);
                }
            }, type === 'ultra' ? 80 : 120);
        }

        function updateDashboard(type, msgs, crashes) {
            floods++;
            if (type === 'crash') this.crashes = crashes;
            peakRate = Math.max(peakRate, type === 'ultra' ? 2000 : 500);
            
            document.getElementById('floodCount').textContent = floods;
            document.getElementById('targetHit').textContent = targets;
            document.getElementById('msgPerSec').textContent = peakRate;
            document.getElementById('totalFloods').textContent = floods;
            document.getElementById('crashCount').textContent = crashes;
            document.getElementById('peakRate').textContent = peakRate;
            statusLive.textContent = '🟢 LIVE';
            statusLive.className = 'ml-auto px-4 py-2 bg-emerald-500/50 rounded-xl font-bold flood-active';
        }

        function execTerminal() {
            const cmd = document.getElementById('terminalCmd').value.trim();
            document.getElementById('terminalCmd').value = '';
            printTerminal(`> ${cmd}`);
            
            const match = cmd.match(/flood\s+(\+\d{10,15})\s+(\d+)/i);
            if (match) {
                document.getElementById('targetNum').value = match[1];
                document.getElementById('floodAmount').value = match[2];
                startFlood('delay');
            }
        }

        // PWA Support
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installPrompt').classList.remove('hidden');
        });

        function installPWA() {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => deferredPrompt = null);
        }

        // Firebase live listener
        db.collection('live_floods').doc('current')
            .onSnapshot(doc => {
                if (doc.data()) {
                    printTerminal(`🔥 LIVE SYNC: ${doc.data().msgSent} msgs → ${doc.data().target}`, '#ffaa00');
                }
            });

        // Init
        printTerminal('🚀 WA Flood Panel v2.0 - Firebase Connected');
        printTerminal('✅ Ready for target acquisition - Enter number + FLOOD!');
        printTerminal('💡 Terminal: flood +62xxx 10000');
    </script>
</body>
</html>
